<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 80" width="560" height="80">
  <rect width="560" height="80" fill="#FAFAF7"/>

  <!-- Vertical rule divider -->
  <line x1="52" y1="16" x2="52" y2="64" stroke="#1B3A2D" stroke-width="1"/>

  <!-- SF monogram left of rule -->
  <text
    x="26" y="50"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="32"
    font-weight="700"
    fill="#1B3A2D">SF</text>

  <!-- SALTWIND FARM right of rule -->
  <text
    x="72" y="38"
    text-anchor="start"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24"
    font-weight="700"
    letter-spacing="3"
    fill="#1B3A2D">SALTWIND FARM</text>

  <!-- Whidbey Island tagline -->
  <text
    x="73" y="58"
    text-anchor="start"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="4"
    fill="#5A7A65">WHIDBEY ISLAND · WASHINGTON</text>
</svg>
