<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420" width="280" height="420">
  <!-- Soft lavender background -->
  <rect width="280" height="420" rx="6" fill="#F2EEF8"/>
  <!-- Outer border -->
  <rect x="10" y="10" width="260" height="400" rx="4" fill="none" stroke="#9B85C0" stroke-width="1.2"/>
  <!-- Inner border -->
  <rect x="16" y="16" width="248" height="388" rx="3" fill="none" stroke="#BBA8D8" stroke-width="0.5"/>

  <!-- Farm name header -->
  <text x="140" y="56" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="600" letter-spacing="5"
    fill="#5A4080">SALTWIND FARM</text>

  <!-- Divider -->
  <line x1="50" y1="66" x2="230" y2="66" stroke="#BBA8D8" stroke-width="0.8"/>

  <!-- Product name -->
  <text x="140" y="128" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="50" font-weight="700"
    fill="#3A2860">Lavender</text>

  <!-- Variety subtitle -->
  <text x="140" y="152" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="11" font-weight="400" letter-spacing="3"
    fill="#7A60A8">DRIED · HIDCOTE VARIETY</text>

  <!-- Mid divider -->
  <line x1="50" y1="170" x2="230" y2="170" stroke="#BBA8D8" stroke-width="0.8"/>

  <!-- Illustrated lavender sprig bundle -->
  <g transform="translate(140,268)">
    <!-- Bundle tie / bow -->
    <ellipse cx="-14" cy="50" rx="10" ry="6" fill="none" stroke="#9B85C0" stroke-width="1.5"/>
    <ellipse cx="14" cy="50" rx="10" ry="6" fill="none" stroke="#9B85C0" stroke-width="1.5"/>
    <line x1="-4" y1="50" x2="4" y2="50" stroke="#9B85C0" stroke-width="1.5"/>

    <!-- Stems -->
    <line x1="-18" y1="44" x2="-24" y2="-30" stroke="#5A7A3A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-8" y1="44" x2="-10" y2="-44" stroke="#5A7A3A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="44" x2="0" y2="-50" stroke="#5A7A3A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="44" x2="10" y2="-44" stroke="#5A7A3A" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="44" x2="24" y2="-30" stroke="#5A7A3A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Lavender florets - left outer stem -->
    <g transform="translate(-24,-30)">
      <ellipse cx="0" cy="-8" rx="3" ry="5" fill="#8B68C0"/>
      <ellipse cx="0" cy="-18" rx="3" ry="5" fill="#9B78D0"/>
      <ellipse cx="0" cy="-28" rx="2.5" ry="4" fill="#AB88D8"/>
      <ellipse cx="0" cy="-36" rx="2" ry="3.5" fill="#BB98E0"/>
      <ellipse cx="0" cy="-43" rx="1.5" ry="3" fill="#CBA8E8"/>
    </g>
    <!-- Florets - left inner -->
    <g transform="translate(-10,-44)">
      <ellipse cx="0" cy="-8" rx="3" ry="5" fill="#7B58B0"/>
      <ellipse cx="0" cy="-18" rx="3" ry="5" fill="#8B68C0"/>
      <ellipse cx="0" cy="-28" rx="2.5" ry="4" fill="#9B78D0"/>
      <ellipse cx="0" cy="-36" rx="2" ry="3.5" fill="#AB88D8"/>
      <ellipse cx="0" cy="-44" rx="1.5" ry="3" fill="#BB98E0"/>
      <ellipse cx="0" cy="-50" rx="1.5" ry="2.5" fill="#CB A8E8"/>
    </g>
    <!-- Florets - center -->
    <g transform="translate(0,-50)">
      <ellipse cx="0" cy="-8" rx="3" ry="5" fill="#6B48A0"/>
      <ellipse cx="0" cy="-18" rx="3" ry="5" fill="#7B58B0"/>
      <ellipse cx="0" cy="-28" rx="2.5" ry="4" fill="#8B68C0"/>
      <ellipse cx="0" cy="-36" rx="2.5" ry="4" fill="#9B78D0"/>
      <ellipse cx="0" cy="-44" rx="2" ry="3.5" fill="#AB88D8"/>
      <ellipse cx="0" cy="-50" rx="1.5" ry="3" fill="#BB98E0"/>
    </g>
    <!-- Florets - right inner -->
    <g transform="translate(10,-44)">
      <ellipse cx="0" cy="-8" rx="3" ry="5" fill="#7B58B0"/>
      <ellipse cx="0" cy="-18" rx="3" ry="5" fill="#8B68C0"/>
      <ellipse cx="0" cy="-28" rx="2.5" ry="4" fill="#9B78D0"/>
      <ellipse cx="0" cy="-36" rx="2" ry="3.5" fill="#AB88D8"/>
      <ellipse cx="0" cy="-44" rx="1.5" ry="3" fill="#BB98E0"/>
    </g>
    <!-- Florets - right outer -->
    <g transform="translate(24,-30)">
      <ellipse cx="0" cy="-8" rx="3" ry="5" fill="#8B68C0"/>
      <ellipse cx="0" cy="-18" rx="3" ry="5" fill="#9B78D0"/>
      <ellipse cx="0" cy="-28" rx="2.5" ry="4" fill="#AB88D8"/>
      <ellipse cx="0" cy="-36" rx="2" ry="3.5" fill="#BB98E0"/>
    </g>
  </g>

  <!-- Lower divider -->
  <line x1="50" y1="330" x2="230" y2="330" stroke="#BBA8D8" stroke-width="0.8"/>

  <!-- Detail text -->
  <text x="140" y="352" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="400" letter-spacing="1"
    fill="#5A4080">Olympic rain shadow grown</text>
  <text x="140" y="370" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="10" font-weight="400" letter-spacing="1"
    fill="#7A60A8">Whidbey Island, Washington</text>

  <!-- Divider -->
  <line x1="80" y1="382" x2="200" y2="382" stroke="#BBA8D8" stroke-width="0.5"/>

  <!-- Domain -->
  <text x="140" y="400" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="9" font-weight="400" letter-spacing="2"
    fill="#9A80C0">saltwind.farm</text>
</svg>
